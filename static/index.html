<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Voice Tutor — English Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: linear-gradient(135deg, #1a1f35, #1e2744);
            border-radius: 16px;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(71, 85, 105, 0.4);
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .status-badge.connected {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.1);
        }

        .status-badge.speaking {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .chat-box {
            flex: 1;
            min-height: 400px;
            max-height: 60vh;
            overflow-y: auto;
            background: #0f1322;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #7dd3fc;
        }

        .msg.assistant {
            align-self: flex-start;
            background: rgba(74, 222, 128, 0.08);
            border: 1px solid rgba(74, 222, 128, 0.15);
            color: #86efac;
        }

        .msg.system {
            align-self: center;
            background: transparent;
            color: #475569;
            font-size: 12px;
            font-style: italic;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .latency {
            text-align: center;
            font-size: 11px;
            color: #475569;
        }

        .latency span {
            color: #6366f1;
            font-weight: 600;
        }

        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗣️ Voice Tutor</h1>
            <div class="status-badge" id="status">Disconnected</div>
        </div>

        <div class="chat-box" id="chat">
            <div class="msg system">Click "Start Talking" and say something to begin practicing!</div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="toggleVoice()">
                Start Talking
            </button>
        </div>
        <div class="latency" id="latency"></div>
    </div>

    <script>
        // ────────────────────────────────────────────────────────────
        // State
        // ────────────────────────────────────────────────────────────
        let ws = null;
        let micCtx = null;          // AudioContext for mic capture (native rate)
        let micStream = null;
        let workletNode = null;

        // Playback uses a separate AudioContext at native rate.
        // Each TTS PCM chunk (24kHz int16) is upsampled to native on the fly
        // via an AudioBuffer resample.
        let playbackCtx = null;
        let nextPlayTime = 0;
        let scheduledSources = [];
        let ttsSampleRate = 24000;

        // ────────────────────────────────────────────────────────────
        // Connect / disconnect
        // ────────────────────────────────────────────────────────────
        async function toggleVoice() {
            const btn = document.getElementById('startBtn');

            if (ws) {
                ws.close();
                stopMic();
                btn.textContent = 'Start Talking';
                btn.classList.remove('active');
                return;
            }

            ws = new WebSocket(`ws://${location.host}/ws/voice`);
            ws.binaryType = 'arraybuffer';

            ws.onopen = async () => {
                setStatus('connected', 'Connected & Listening');
                btn.textContent = 'Stop';
                btn.classList.add('active');
                try {
                    await startMic();
                } catch (e) {
                    appendMessage('system', `Mic error: ${e.message}`);
                    setStatus('disconnected', 'Mic Error');
                }
            };

            ws.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } else {
                    queueAudio(event.data);
                }
            };

            ws.onclose = () => {
                setStatus('disconnected', 'Disconnected');
                btn.textContent = 'Start Talking';
                btn.classList.remove('active');
                ws = null;
                flushAudio();
            };

            ws.onerror = () => {
                setStatus('disconnected', 'Connection Error');
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'FLUSH':
                    // Barge-in: immediately stop all audio
                    flushAudio();
                    break;
                case 'TRANSCRIPT':
                    appendMessage(msg.role, msg.text);
                    if (msg.role === 'assistant') {
                        setStatus('speaking', 'Agent Speaking...');
                    }
                    break;
                case 'AUDIO_START':
                    ttsSampleRate = msg.sample_rate || 24000;
                    break;
                case 'END_OF_TURN':
                    setStatus('connected', 'Connected & Listening');
                    break;
                case 'ERROR':
                    appendMessage('system', `⚠️ ${msg.message}`);
                    break;
            }
        }

        // ────────────────────────────────────────────────────────────
        // Mic capture via AudioWorklet
        // ────────────────────────────────────────────────────────────
        async function startMic() {
            // AudioContext at native rate — browsers ignore sampleRate hint.
            micCtx = new AudioContext();

            // Browser AEC: echoCancellation removes speaker feedback from mic input.
            // This is the first line of defense against false barge-in.
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                }
            });

            // Load the worklet that downsamples native→16kHz
            await micCtx.audioWorklet.addModule('/static/resample-processor.js');

            const source = micCtx.createMediaStreamSource(micStream);
            workletNode = new AudioWorkletNode(micCtx, 'resample-processor');

            // Forward each 512-sample int16 chunk to the server
            workletNode.port.onmessage = (event) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(event.data); // event.data is an ArrayBuffer
                }
            };

            source.connect(workletNode);
            // AudioWorkletNode requires a downstream connection to fire process();
            // a zero-gain node silences any accidental passthrough to speakers.
            const muteGain = micCtx.createGain();
            muteGain.gain.value = 0;
            workletNode.connect(muteGain);
            muteGain.connect(micCtx.destination);
        }

        function stopMic() {
            if (workletNode) { workletNode.disconnect(); workletNode = null; }
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
                micStream = null;
            }
            if (micCtx) { micCtx.close(); micCtx = null; }
        }

        // ────────────────────────────────────────────────────────────
        // Sequential PCM playback
        // ────────────────────────────────────────────────────────────
        // We use a single AudioContext at native rate. Each incoming 24kHz
        // chunk is wrapped in an AudioBuffer (which performs the resample to
        // native rate during scheduling) and queued back-to-back.
        function queueAudio(arrayBuffer) {
            if (!playbackCtx) {
                playbackCtx = new AudioContext();
                nextPlayTime = playbackCtx.currentTime;
            }

            const int16 = new Int16Array(arrayBuffer);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768.0;
            }

            // AudioBuffer with the SOURCE sample rate (24kHz) — the
            // AudioContext will resample to native rate automatically on play.
            const buffer = playbackCtx.createBuffer(1, float32.length, ttsSampleRate);
            buffer.getChannelData(0).set(float32);

            const src = playbackCtx.createBufferSource();
            src.buffer = buffer;
            src.connect(playbackCtx.destination);

            const startTime = Math.max(nextPlayTime, playbackCtx.currentTime);
            src.start(startTime);
            nextPlayTime = startTime + buffer.duration;

            scheduledSources.push(src);
            src.onended = () => {
                const idx = scheduledSources.indexOf(src);
                if (idx > -1) scheduledSources.splice(idx, 1);
            };
        }

        function flushAudio() {
            // Barge-in: stop everything immediately.
            scheduledSources.forEach(s => {
                try { s.stop(); } catch (e) {}
            });
            scheduledSources = [];
            nextPlayTime = 0;
            // Close + recreate the playback context for a clean slate.
            // (Merely stopping sources doesn't always clear scheduled buffers.)
            if (playbackCtx) {
                playbackCtx.close();
                playbackCtx = null;
            }
        }

        // ────────────────────────────────────────────────────────────
        // UI helpers
        // ────────────────────────────────────────────────────────────
        function setStatus(state, text) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status-badge ' + state;
        }

        function appendMessage(role, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
