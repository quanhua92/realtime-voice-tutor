<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Voice Tutor — English Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: linear-gradient(135deg, #1a1f35, #1e2744);
            border-radius: 16px;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(71, 85, 105, 0.4);
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .status-badge.connected {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.1);
        }

        .status-badge.speaking {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .chat-box {
            flex: 1;
            min-height: 400px;
            max-height: 60vh;
            overflow-y: auto;
            background: #0f1322;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #7dd3fc;
        }

        .msg.assistant {
            align-self: flex-start;
            background: rgba(74, 222, 128, 0.08);
            border: 1px solid rgba(74, 222, 128, 0.15);
            color: #86efac;
        }

        .msg.assistant strong { color: #bbf7d0; font-weight: 700; }
        .msg.assistant em { color: #bef264; font-style: italic; }
        .msg.assistant code {
            background: rgba(30, 41, 59, 0.6);
            color: #fbbf24;
            padding: 1px 6px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px;
        }
        .msg.assistant ul, .msg.assistant ol {
            margin: 6px 0 6px 20px;
        }
        .msg.assistant li { margin: 2px 0; }

        /* --- Collapsible Thinking + Tool sections --- */
        .msg.meta {
            align-self: flex-start;
            background: rgba(30, 41, 59, 0.4);
            border-left: 2px solid rgba(148, 163, 184, 0.4);
            color: #94a3b8;
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            padding: 6px 10px;
            border-radius: 6px;
            max-width: 90%;
            margin-top: -6px;   /* tuck under the assistant message it relates to */
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg.meta > summary {
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .msg.meta > summary::before {
            content: "▸";
            font-size: 10px;
            transition: transform 0.15s ease;
        }
        .msg.meta[open] > summary::before {
            transform: rotate(90deg);
        }
        .msg.meta > summary::-webkit-details-marker { display: none; }
        .msg.meta .meta-body {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
            line-height: 1.5;
        }
        .msg.meta.tool-call > summary { color: #a78bfa; }
        .msg.meta.tool-call { border-left-color: rgba(167, 139, 250, 0.5); }
        .msg.meta.tool-result > summary { color: #fbbf24; }
        .msg.meta.tool-result { border-left-color: rgba(251, 191, 36, 0.5); }
        .msg.meta.thinking > summary { color: #64748b; }

        .msg.system {
            align-self: center;
            background: transparent;
            color: #475569;
            font-size: 12px;
            font-style: italic;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary.active {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .latency {
            text-align: center;
            font-size: 11px;
            color: #475569;
        }

        .latency span {
            color: #6366f1;
            font-weight: 600;
        }

        .device-row {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
            color: #94a3b8;
            padding: 0 4px;
        }

        .device-row select {
            flex: 1;
            background: #1e2744;
            color: #e2e8f0;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            padding: 8px 10px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
        }

        .device-row select:focus {
            outline: none;
            border-color: rgba(99, 102, 241, 0.6);
        }

        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗣️ Voice Tutor</h1>
            <div class="status-badge" id="status">Disconnected</div>
        </div>

        <div class="chat-box" id="chat">
            <div class="msg system">Click "Start Talking" and say something to begin practicing!</div>
        </div>

        <div class="device-row" id="deviceRow" style="display:none;">
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
                <input type="checkbox" id="aecToggle" checked onchange="changeAec()" style="cursor:pointer;">
                <span>AEC</span>
            </label>
            <span>🔊</span>
            <select id="outputPicker" onchange="changeOutput()">
                <option value="">System default</option>
            </select>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="toggleVoice()">
                Start Talking
            </button>
        </div>
        <div class="latency" id="latency"></div>
    </div>

    <script>
        // ────────────────────────────────────────────────────────────
        // State
        // ────────────────────────────────────────────────────────────
        let ws = null;
        let micCtx = null;          // AudioContext for mic capture (native rate)
        let micStream = null;
        let workletNode = null;

        // Playback uses a separate AudioContext at native rate.
        // Each TTS PCM chunk (24kHz int16) is upsampled to native on the fly
        // via an AudioBuffer resample.
        // chosenSinkId is applied AT AudioContext creation per Chrome docs
        // (https://developer.chrome.com/blog/audiocontext-setsinkid) to
        // bypass Chrome routing audio to the "call" speaker when AEC is on.
        let playbackCtx = null;
        let nextPlayTime = 0;
        let scheduledSources = [];
        let ttsSampleRate = 24000;
        let chosenSinkId = '';   // '' = system default; set by dropdown
        let lastFlushTime = 0;  // ms timestamp of last FLUSH; used to drop in-flight chunks
        let endOfTurnReceived = false;  // true after server says turn is done; cleared when queue drains
        let lastThinkingDetails = null;  // tracks last <details> thinking block for merging

        // ────────────────────────────────────────────────────────────
        // Connect / disconnect
        // ────────────────────────────────────────────────────────────
        async function toggleVoice() {
            const btn = document.getElementById('startBtn');

            if (ws) {
                ws.close();
                stopMic();
                btn.textContent = 'Start Talking';
                btn.classList.remove('active');
                return;
            }

            // Use wss:// when page is HTTPS (avoids mixed-content blocking)
            const wsScheme = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${wsScheme}://${location.host}/ws/voice`);
            ws.binaryType = 'arraybuffer';

            ws.onopen = async () => {
                console.log('[ws] connected');
                setStatus('connected', 'Connected & Listening');
                btn.textContent = 'Stop';
                btn.classList.add('active');
                try {
                    await startMic();
                } catch (e) {
                    appendMessage('system', `Mic error: ${e.message}`);
                    setStatus('disconnected', 'Mic Error');
                }
            };

            ws.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } else {
                    console.log(`[ws] ← binary chunk (${event.data.byteLength} bytes)`);
                    queueAudio(event.data);
                }
            };

            ws.onclose = () => {
                console.log('[ws] closed');
                setStatus('disconnected', 'Disconnected');
                btn.textContent = 'Start Talking';
                btn.classList.remove('active');
                ws = null;
                flushAudio();
            };

            ws.onerror = (e) => {
                console.log('[ws] error', e);
                setStatus('disconnected', 'Connection Error');
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'FLUSH':
                    // Barge-in: immediately stop all audio
                    console.log('[ws] ← FLUSH (barge-in)');
                    flushAudio();
                    break;
                case 'TRANSCRIPT':
                    console.log(`[ws] ← TRANSCRIPT ${msg.role}: ${msg.text.slice(0, 60)}`);
                    appendMessage(msg.role, msg.text);
                    if (msg.role === 'assistant') {
                        setStatus('speaking', 'Agent Speaking...');
                    }
                    break;
                case 'THINKING':
                    console.log(`[ws] ← THINKING (${msg.text.length} chars)`);
                    appendMeta('thinking', `💭 Thinking (${msg.text.length} chars)`, msg.text, { autoOpen: false });
                    break;
                case 'TOOL_CALL':
                    console.log(`[ws] ← TOOL_CALL ${msg.name}(${JSON.stringify(msg.arguments)})`);
                    {
                        const argStr = JSON.stringify(msg.arguments, null, 2);
                        appendMeta('tool-call', `🛠️ ${msg.name}(${argStr.length > 40 ? argStr.slice(0, 40) + '…' : argStr})`, argStr, { autoOpen: false });
                    }
                    break;
                case 'TOOL_RESULT':
                    console.log(`[ws] ← TOOL_RESULT ${msg.name} (${msg.result.length} chars)`);
                    {
                        // Show first 80 chars of result as preview in the label,
                        // full content in the body
                        const preview = msg.result.length > 80
                            ? msg.result.slice(0, 80) + '…'
                            : msg.result;
                        appendMeta('tool-result', `✅ ${msg.name}: ${preview}`, msg.result, { autoOpen: false });
                    }
                    break;
                case 'AUDIO_START':
                    console.log(`[ws] ← AUDIO_START sample_rate=${msg.sample_rate}`);
                    ttsSampleRate = msg.sample_rate || 24000;
                    break;
                case 'END_OF_TURN':
                    console.log('[ws] ← END_OF_TURN');
                    endOfTurnReceived = true;
                    if (scheduledSources.length === 0 && ws && ws.readyState === WebSocket.OPEN) {
                        console.log('[ws] → AUDIO_DONE (queue empty at END_OF_TURN)');
                        ws.send(JSON.stringify({ type: 'AUDIO_DONE' }));
                        endOfTurnReceived = false;
                    }
                    setStatus('connected', 'Connected & Listening');
                    break;
                case 'ERROR':
                    console.log(`[ws] ← ERROR: ${msg.message}`);
                    appendMessage('system', `⚠️ ${msg.message}`);
                    break;
            }
        }

        function appendMeta(kind, label, body, opts) {
            const chat = document.getElementById('chat');

            // Merge consecutive thinking blocks: if the previous meta block
            // was also thinking, append to its body instead of creating a
            // new <details>. This keeps the UI clean even if the server
            // flushes thinking in multiple chunks (e.g. once per LLM round
            // when there's no tool call in between, or if the server-side
            // flush logic changes later).
            if (kind === 'thinking' && lastThinkingDetails) {
                const bodyDiv = lastThinkingDetails.querySelector('.meta-body');
                bodyDiv.textContent += '\n' + body;
                const newLen = bodyDiv.textContent.length;
                const summary = lastThinkingDetails.querySelector('summary');
                summary.textContent = `💭 Thinking (${newLen} chars)`;
                chat.scrollTop = chat.scrollHeight;
                return;
            }

            const details = document.createElement('details');
            details.className = `msg meta ${kind}`;
            // All meta blocks start collapsed by default — they're verbose
            // internal details, not the main conversation. User can expand
            // any block by clicking it.
            details.open = false;
            const summary = document.createElement('summary');
            summary.textContent = label;
            summary.style.overflow = 'hidden';
            summary.style.textOverflow = 'ellipsis';
            summary.style.whiteSpace = 'nowrap';
            summary.title = label;  // full text on hover
            const bodyDiv = document.createElement('div');
            bodyDiv.className = 'meta-body';
            bodyDiv.textContent = body;
            details.appendChild(summary);
            details.appendChild(bodyDiv);
            chat.appendChild(details);
            chat.scrollTop = chat.scrollHeight;

            // Track thinking reference for merging; any other kind breaks
            // the chain (so thinking before a tool call ≠ thinking after).
            lastThinkingDetails = (kind === 'thinking') ? details : null;
        }

        // ────────────────────────────────────────────────────────────
        // Mic capture via AudioWorklet
        // ────────────────────────────────────────────────────────────
        async function startMic() {
            // AudioContext at native rate — browsers ignore sampleRate hint.
            micCtx = new AudioContext();

            // Browser AEC: echoCancellation removes speaker feedback from mic input.
            // This is the first line of defense against false barge-in.
            // SIDE EFFECT: Chrome tags the page as "communications" mode and
            // routes ALL audio through the system's comms device (call speaker,
            // Bluetooth headset call channel). We let the user pick a media
            // output device via setSinkId to override this — and system AEC
            // follows the new output, so we keep echo cancellation benefits.
            const aecOn = document.getElementById('aecToggle').checked;
            console.log(`[mic] requesting getUserMedia with AEC=${aecOn}`);
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: aecOn,
                    noiseSuppression: aecOn,
                    autoGainControl: aecOn,
                }
            });

            // Verify what the browser actually granted us — the constraints
            // are HINTS, not requirements. Log the effective settings so we
            // can debug "why is AEC off" type questions.
            const track = micStream.getAudioTracks()[0];
            const settings = track.getSettings();
            console.log('[mic] actual track settings:', {
                echoCancellation: settings.echoCancellation,
                noiseSuppression: settings.noiseSuppression,
                autoGainControl: settings.autoGainControl,
                sampleRate: settings.sampleRate,
                sampleSize: settings.sampleSize,
                channelCount: settings.channelCount,
                label: track.label,
            });
            if (settings.echoCancellation !== aecOn) {
                console.warn(`[mic] WARNING: requested AEC=${aecOn} but browser gave us AEC=${settings.echoCancellation}`);
                appendMessage('system', `⚠️ Browser ignored AEC request — got echoCancellation=${settings.echoCancellation}`);
            }

            // Populate the output device picker.
            // Chrome hides device labels until mic permission is granted,
            // so we can only meaningfully populate this AFTER getUserMedia.
            await refreshOutputDevices();

            // Load the worklet that downsamples native→16kHz
            await micCtx.audioWorklet.addModule('/static/resample-processor.js');

            const source = micCtx.createMediaStreamSource(micStream);
            workletNode = new AudioWorkletNode(micCtx, 'resample-processor');

            // Forward each 512-sample int16 chunk to the server
            workletNode.port.onmessage = (event) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(event.data); // event.data is an ArrayBuffer
                }
            };

            source.connect(workletNode);
            // AudioWorkletNode requires a downstream connection to fire process();
            // a zero-gain node silences any accidental passthrough to speakers.
            const muteGain = micCtx.createGain();
            muteGain.gain.value = 0;
            workletNode.connect(muteGain);
            muteGain.connect(micCtx.destination);
        }

        function stopMic() {
            if (workletNode) { workletNode.disconnect(); workletNode = null; }
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
                micStream = null;
            }
            if (micCtx) { micCtx.close(); micCtx = null; }
        }

        // ────────────────────────────────────────────────────────────
        // Sequential PCM playback
        // ────────────────────────────────────────────────────────────
        // We use a single AudioContext at native rate. Each incoming 24kHz
        // chunk is wrapped in an AudioBuffer (which performs the resample to
        // native rate during scheduling) and queued back-to-back.
        async function refreshOutputDevices() {
            const sel = document.getElementById('outputPicker');
            const row = document.getElementById('deviceRow');
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
                return; // browser too old — picker stays hidden
            }
            const devices = await navigator.mediaDevices.enumerateDevices();
            const outputs = devices.filter(d => d.kind === 'audiooutput');
            if (outputs.length === 0) return;

            // Preserve current selection
            const prevValue = sel.value;
            sel.innerHTML = '';

            // First option: empty-string sinkId = system default (per spec)
            const defaultOpt = document.createElement('option');
            defaultOpt.value = '';
            defaultOpt.textContent = 'System default';
            sel.appendChild(defaultOpt);

            // List all real output devices with their labels.
            // Skip Chrome's own "Default - <device>" entry — it duplicates our
            // manual "System default" option (Chrome adds one per default device
            // group, which on macOS produces duplicate "Default" entries).
            for (const d of outputs) {
                let label = d.label || `Device ${d.deviceId.slice(0, 8)}`;
                // Skip if this is Chrome's "Default - ..." pseudo-entry
                if (/^Default\s*[-–]/i.test(label)) continue;
                // Strip "Default - " prefix if somehow still there
                label = label.replace(/^Default\s*[-–]\s*/i, '');

                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.textContent = label;
                sel.appendChild(opt);
            }

            // If the user previously picked something, keep it
            if (prevValue && Array.from(sel.options).some(o => o.value === prevValue)) {
                sel.value = prevValue;
            }

            // Show the picker
            row.style.display = 'flex';
        }

        async function changeOutput() {
            const sel = document.getElementById('outputPicker');
            chosenSinkId = sel.value;

            // If playback already started, recreate the AudioContext with the
            // new sinkId. Merely calling setSinkId on an existing context also
            // works (Chrome 110+) but recreating is more reliable across
            // browser versions and avoids race conditions with scheduled
            // buffers.
            if (playbackCtx) {
                scheduledSources.forEach(s => { try { s.stop(); } catch (e) {} });
                scheduledSources = [];
                nextPlayTime = 0;
                try { playbackCtx.close(); } catch (e) {}
                playbackCtx = null;
            }
            console.log(`Output device → ${chosenSinkId === '' ? 'system default' : chosenSinkId}`);
        }

        async function changeAec() {
            // Toggling AEC requires re-acquiring the mic stream with new constraints.
            // This MUST happen after a user gesture (the toggle click qualifies).
            const aecOn = document.getElementById('aecToggle').checked;
            console.log(`[aec] toggle clicked → aecOn=${aecOn}`);
            if (!micStream) {
                console.log('[aec] mic not started yet, ignoring');
                return;
            }

            // Stop existing tracks and worklet
            if (workletNode) { try { workletNode.disconnect(); } catch(e) {} workletNode = null; }
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
                micStream = null;
            }

            // Re-acquire mic with the new AEC setting
            try {
                console.log(`[aec] re-acquiring mic with AEC=${aecOn}`);
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: aecOn,
                        noiseSuppression: aecOn,    // tie NS to AEC for simplicity
                        autoGainControl: aecOn,
                    }
                });
            } catch (e) {
                appendMessage('system', `⚠️ Mic restart failed: ${e.message}`);
                // Re-check the box since we couldn't actually change it
                document.getElementById('aecToggle').checked = !aecOn;
                return;
            }

            // Verify the browser actually honored the AEC change
            const track = micStream.getAudioTracks()[0];
            const settings = track.getSettings();
            console.log('[aec] new actual settings:', {
                echoCancellation: settings.echoCancellation,
                noiseSuppression: settings.noiseSuppression,
                autoGainControl: settings.autoGainControl,
            });
            if (settings.echoCancellation !== aecOn) {
                console.warn(`[aec] browser ignored request — wanted AEC=${aecOn}, got AEC=${settings.echoCancellation}`);
                appendMessage('system', `⚠️ Browser ignored AEC toggle — wanted ${aecOn}, got ${settings.echoCancellation}`);
            }

            // Rewire worklet → mute → destination
            const source = micCtx.createMediaStreamSource(micStream);
            workletNode = new AudioWorkletNode(micCtx, 'resample-processor');
            workletNode.port.onmessage = (event) => {
                if (ws && ws.readyState === WebSocket.OPEN) ws.send(event.data);
            };
            source.connect(workletNode);
            const muteGain = micCtx.createGain();
            muteGain.gain.value = 0;
            workletNode.connect(muteGain);
            muteGain.connect(micCtx.destination);

            console.log(`AEC → ${aecOn ? 'ON (echo cancelled, may route to call speaker)' : 'OFF (media speaker, rely on server VAD threshold for echo rejection)'}`);
            appendMessage('system', aecOn
                ? '🎙️ AEC on — browser cancels speaker echo (may route audio to call channel).'
                : '📢 AEC off — audio routes to media speaker. Server-side VAD threshold (0.92) still rejects echo during agent speech.');
        }

        function queueAudio(arrayBuffer) {
            // Defense-in-depth: drop chunks arriving within 250ms of a FLUSH.
            // These are in-flight chunks the server sent just before/during
            // barge-in cancellation. The server's epoch check should already
            // prevent them, but WebSocket buffering can still slip one through.
            if (lastFlushTime && (Date.now() - lastFlushTime) < 250) {
                console.log(`[audio] 🛑 dropping in-flight chunk (post-FLUSH window, ${Date.now() - lastFlushTime}ms)`);
                return;
            }

            if (!playbackCtx) {
                // Pass sinkId AT CONSTRUCTION (Chrome 110+) — this is the
                // documented way to override Chrome's "communications" mode
                // routing. Empty string = system default.
                // See https://developer.chrome.com/blog/audiocontext-setsinkid
                try {
                    playbackCtx = new AudioContext({ sinkId: chosenSinkId });
                    console.log(`[audio] created playbackCtx (sinkId=${chosenSinkId || 'default'}, sr=${playbackCtx.sampleRate})`);
                } catch (e) {
                    // Older browsers may not accept sinkId in constructor
                    playbackCtx = new AudioContext();
                    console.log(`[audio] created playbackCtx (fallback, sr=${playbackCtx.sampleRate})`);
                }
                nextPlayTime = playbackCtx.currentTime;
            }

            const int16 = new Int16Array(arrayBuffer);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768.0;
            }

            // AudioBuffer with the SOURCE sample rate (24kHz) — the
            // AudioContext will resample to native rate automatically on play.
            const buffer = playbackCtx.createBuffer(1, float32.length, ttsSampleRate);
            buffer.getChannelData(0).set(float32);

            const src = playbackCtx.createBufferSource();
            src.buffer = buffer;
            src.connect(playbackCtx.destination);

            const startTime = Math.max(nextPlayTime, playbackCtx.currentTime);
            src.start(startTime);
            nextPlayTime = startTime + buffer.duration;

            scheduledSources.push(src);
            src.onended = () => {
                const idx = scheduledSources.indexOf(src);
                if (idx > -1) scheduledSources.splice(idx, 1);
                // When the last scheduled source finishes playing AND we've
                // received END_OF_TURN, notify the server. The server keeps
                // is_agent_speaking=True until this arrives so barge-in can
                // still fire while audio is playing on the client (the server
                // has already finished sending but the user is still hearing
                // the agent's voice).
                if (scheduledSources.length === 0 && endOfTurnReceived && ws && ws.readyState === WebSocket.OPEN) {
                    console.log('[ws] → AUDIO_DONE (playback queue drained)');
                    ws.send(JSON.stringify({ type: 'AUDIO_DONE' }));
                    endOfTurnReceived = false;
                }
            };
        }

        function flushAudio() {
            console.log('⚡ FLUSH — stopping all audio');
            // Mark the time so queueAudio can drop in-flight chunks that
            // arrive within 250ms (defense against WebSocket buffering).
            lastFlushTime = Date.now();
            // Cancel any pending AUDIO_DONE — the server's FLUSH already
            // tells it to reset state; we don't want a stale AUDIO_DONE
            // arriving afterwards and confusing the next turn.
            endOfTurnReceived = false;

            // Barge-in: stop everything immediately.
            scheduledSources.forEach(s => {
                try { s.stop(); } catch (e) {}
            });
            scheduledSources = [];
            nextPlayTime = 0;
            // Close + recreate the playback context for a clean slate.
            // (Merely stopping sources doesn't always clear scheduled buffers.)
            if (playbackCtx) {
                playbackCtx.close();
                playbackCtx = null;
            }
        }

        // ────────────────────────────────────────────────────────────
        // UI helpers
        // ────────────────────────────────────────────────────────────
        function setStatus(state, text) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status-badge ' + state;
        }

        function appendMessage(role, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            if (role === 'assistant') {
                // Render a small subset of markdown: **bold**, *italic*,
                // `code`, and newlines. HTML is escaped first to prevent
                // any injection from LLM output.
                div.innerHTML = renderMarkdown(text);
            } else {
                // User + system messages: plain text only.
                div.textContent = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            // Any non-meta message breaks the thinking-merge chain
            lastThinkingDetails = null;
        }

        function renderMarkdown(text) {
            // 1. Escape HTML first — everything below inserts known-safe tags.
            let s = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 2. Inline code (`...`) — apply before * and ** so the asterisks
            //    inside code aren't reinterpreted.
            s = s.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 3. Bold (**...**) — apply before italic so ** beats *.
            s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // 4. Italic (*...*) — single asterisks not adjacent to another *.
            s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');

            // 5. Bullet lists: lines starting with "- " become <ul><li>.
            //    Collapse consecutive bullet lines into one <ul>.
            s = s.replace(/(?:^|\n)(?:- (.+)(?:\n|$))+/g, (block) => {
                const items = block.trim().split(/\n/).map(
                    line => line.replace(/^- /, '').trim()
                );
                return '\n<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
            });

            // 6. Newlines → <br> (after list handling, so <ul> blocks stay clean)
            s = s.replace(/\n/g, '<br>');

            // 7. Tidy: <br> right before <ul> or after </ul>
            s = s.replace(/<br>(<ul>)/g, '$1')
                 .replace(/(<\/ul>)<br>/g, '$1');

            return s;
        }
    </script>
</body>
